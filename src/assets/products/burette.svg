<svg viewBox="0 0 64 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Main tube — very narrow, almost full height -->
  <rect x="28.5" y="4" width="7" height="54" rx="2"
        fill="rgba(200,151,255,0.10)" stroke="rgba(200,151,255,0.5)" stroke-width="1.5"/>
  <!-- Tube inner highlight -->
  <rect x="30" y="5.5" width="2.5" height="51" rx="1" fill="rgba(255,255,255,0.07)"/>
  <!-- Liquid fill inside tube -->
  <rect x="30" y="5.5" width="4" height="34" rx="1" fill="rgba(153,213,255,0.18)"/>
  <!-- Concave meniscus (characteristic burette read point) -->
  <path d="M30 39.5 Q32 42.5 35.5 39.5" fill="rgba(153,213,255,0.30)" stroke="none"/>
  <!-- Major graduation marks (left side, every 8px = 5 mL intervals) -->
  <line x1="28.5" y1="12" x2="21" y2="12" stroke="rgba(153,213,255,0.85)" stroke-width="1.1"/>
  <line x1="28.5" y1="20" x2="21" y2="20" stroke="rgba(153,213,255,0.85)" stroke-width="1.1"/>
  <line x1="28.5" y1="28" x2="21" y2="28" stroke="rgba(153,213,255,0.85)" stroke-width="1.1"/>
  <line x1="28.5" y1="36" x2="21" y2="36" stroke="rgba(153,213,255,0.85)" stroke-width="1.1"/>
  <line x1="28.5" y1="44" x2="21" y2="44" stroke="rgba(153,213,255,0.85)" stroke-width="1.1"/>
  <line x1="28.5" y1="52" x2="21" y2="52" stroke="rgba(153,213,255,0.85)" stroke-width="1.1"/>
  <!-- Minor graduation marks (midpoints) -->
  <line x1="28.5" y1="16" x2="24" y2="16" stroke="rgba(153,213,255,0.50)" stroke-width="0.8"/>
  <line x1="28.5" y1="24" x2="24" y2="24" stroke="rgba(153,213,255,0.50)" stroke-width="0.8"/>
  <line x1="28.5" y1="32" x2="24" y2="32" stroke="rgba(153,213,255,0.50)" stroke-width="0.8"/>
  <line x1="28.5" y1="40" x2="24" y2="40" stroke="rgba(153,213,255,0.50)" stroke-width="0.8"/>
  <line x1="28.5" y1="48" x2="24" y2="48" stroke="rgba(153,213,255,0.50)" stroke-width="0.8"/>
  <!-- PTFE stopcock body -->
  <rect x="22" y="58" width="20" height="7" rx="3.5"
        fill="rgba(200,151,255,0.15)" stroke="rgba(200,151,255,0.55)" stroke-width="1.5"/>
  <!-- Stopcock handle bar (perpendicular) -->
  <rect x="16" y="60" width="10" height="3" rx="1.5"
        fill="rgba(200,151,255,0.32)" stroke="rgba(200,151,255,0.65)" stroke-width="1"/>
  <!-- Tapered tip below stopcock -->
  <path d="M30 65 L31.5 76 L34 65" fill="none"
        stroke="rgba(200,151,255,0.50)" stroke-width="1.5" stroke-linejoin="round"/>
</svg>
