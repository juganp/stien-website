<svg viewBox="0 0 64 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Long narrow neck -->
  <rect x="27" y="4" width="10" height="28" rx="2"
        fill="rgba(200,151,255,0.12)" stroke="rgba(200,151,255,0.5)" stroke-width="1.5"/>
  <!-- Neck inner highlight -->
  <rect x="29" y="6" width="3" height="24" rx="1.5" fill="rgba(255,255,255,0.07)"/>
  <!-- Single calibration mark — the hallmark of a one-mark volumetric flask -->
  <line x1="33" y1="22" x2="42" y2="22" stroke="rgba(153,213,255,0.95)" stroke-width="1.3"/>
  <!-- Shoulder + round bulb (smooth Bezier from neck width to spherical body) -->
  <path d="M27 32 C24 36 14 42 14 60 C14 74 20 79 32 79 C44 79 50 74 50 60 C50 42 40 36 37 32 Z"
        fill="rgba(200,151,255,0.08)" stroke="rgba(200,151,255,0.45)" stroke-width="1.5"/>
  <!-- Liquid fill (lower half of bulb) -->
  <path d="M15 62 C15 74 20 79 32 79 C44 79 49 74 49 62 Z"
        fill="rgba(153,213,255,0.18)"/>
  <!-- Liquid meniscus surface -->
  <ellipse cx="32" cy="62" rx="17" ry="3.5" fill="rgba(153,213,255,0.30)"/>
  <!-- Glass highlight on body -->
  <path d="M19 50 Q17 62 18 70" stroke="rgba(255,255,255,0.15)" stroke-width="2" stroke-linecap="round"/>
</svg>
