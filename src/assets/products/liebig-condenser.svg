<svg viewBox="0 0 64 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Inner delivery tube — extends beyond the jacket at both ends -->
  <rect x="27" y="2" width="10" height="76" rx="2"
        fill="rgba(200,151,255,0.12)" stroke="rgba(200,151,255,0.5)" stroke-width="1.5"/>
  <!-- Inner tube highlight -->
  <rect x="29" y="3" width="3" height="74" rx="1.5" fill="rgba(255,255,255,0.07)"/>
  <!-- Outer water jacket -->
  <rect x="17" y="14" width="30" height="52" rx="4"
        fill="rgba(153,213,255,0.07)" stroke="rgba(153,213,255,0.45)" stroke-width="1.5"/>
  <!-- Water fill in annular space (between inner tube and outer jacket) -->
  <rect x="18.5" y="15.5" width="9" height="49" rx="2" fill="rgba(153,213,255,0.12)"/>
  <rect x="36.5" y="15.5" width="9" height="49" rx="2" fill="rgba(153,213,255,0.12)"/>
  <!-- Water flow ripple lines in jacket -->
  <line x1="21" y1="28" x2="26" y2="28" stroke="rgba(153,213,255,0.28)" stroke-width="0.8" stroke-dasharray="2,2"/>
  <line x1="21" y1="36" x2="26" y2="36" stroke="rgba(153,213,255,0.20)" stroke-width="0.8" stroke-dasharray="2,2"/>
  <line x1="21" y1="44" x2="26" y2="44" stroke="rgba(153,213,255,0.28)" stroke-width="0.8" stroke-dasharray="2,2"/>
  <line x1="21" y1="52" x2="26" y2="52" stroke="rgba(153,213,255,0.20)" stroke-width="0.8" stroke-dasharray="2,2"/>
  <!-- Water inlet port — bottom left of jacket -->
  <rect x="4" y="56" width="13" height="5" rx="2.5"
        fill="rgba(153,213,255,0.15)" stroke="rgba(153,213,255,0.55)" stroke-width="1.2"/>
  <!-- Inlet connector line to jacket -->
  <line x1="17" y1="58.5" x2="17" y2="58.5" stroke="rgba(153,213,255,0.4)" stroke-width="1"/>
  <!-- Water outlet port — top left of jacket -->
  <rect x="4" y="19" width="13" height="5" rx="2.5"
        fill="rgba(153,213,255,0.15)" stroke="rgba(153,213,255,0.55)" stroke-width="1.2"/>
</svg>
