<div class="ind section-padding">
  <div class="ind__backdrop" aria-hidden="true"></div>

  <div class="section-container">

    <header class="ind__header">
      <div class="section-badge">
        <svg width="8" height="8" viewBox="0 0 8 8" aria-hidden="true"><circle cx="4" cy="4" r="4" fill="currentColor"/></svg>
        Industries Served
      </div>
      <div class="arc-divider"></div>
      <h2 class="text-h2 ind__title">
        Precision Apparatus<br>
        <em class="ind__title-em">for Every Application</em>
      </h2>
    </header>

    <!-- Tab bar -->
    <div class="ind__tabs-scroll-wrap">
      <div class="ind__tabs" role="tablist" aria-label="Industry sectors">
        @for (tab of tabs; track tab.id) {
          <button
            class="ind__tab"
            [class.ind__tab--active]="activeTab() === tab.id"
            role="tab"
            [attr.aria-selected]="activeTab() === tab.id"
            [attr.aria-controls]="'panel-' + tab.id"
            [id]="'tab-' + tab.id"
            (click)="selectTab(tab.id)"
            type="button"
          >
            {{ tab.label }}
          </button>
        }
      </div>
    </div>

    <!-- Panel -->
    <div
      class="ind__panel glass-elevated"
      [id]="'panel-' + activeData.id"
      role="tabpanel"
      [attr.aria-labelledby]="'tab-' + activeData.id"
    >
      <div class="ind__panel-layout">

        <!-- Left: text -->
        <div class="ind__panel-copy">
          <h3 class="ind__panel-headline">{{ activeData.headline }}</h3>
          <p class="ind__panel-body">{{ activeData.body }}</p>
          <div class="ind__spec-badge">
            <span class="text-spec ind__spec-text">{{ activeData.spec }}</span>
          </div>
          <a href="#contact" class="btn-primary ind__cta" (click)="scrollTo('contact', $event)">
            Request a Quote
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
          </a>
        </div>

        <!-- Right: product list -->
        <div class="ind__products" aria-label="Applicable products">
          <h4 class="ind__products-title">Applicable Products</h4>
          <ul class="ind__product-list" role="list">
            @for (product of activeData.products; track product) {
              <li class="ind__product-item">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="9 11 12 14 22 4"/></svg>
                <span>{{ product }}</span>
              </li>
            }
          </ul>
        </div>

      </div>
    </div>

  </div>
</div>
