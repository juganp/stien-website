<nav class="navbar" [class.scrolled]="isScrolled()">
  <div class="navbar__container">
    <a routerLink="/" class="navbar__brand">
      <img src="assets/images/Stien Logo.png" alt="Stien" class="navbar__logo" />
    </a>

    <ul class="navbar__links" [class.open]="menuOpen()">
      @for (link of navLinks; track link.path) {
        <li>
          <a [routerLink]="link.path" routerLinkActive="active"
             [routerLinkActiveOptions]="{exact: link.path === '/'}"
             (click)="menuOpen.set(false)">{{ link.label }}</a>
        </li>
      }
    </ul>

    <div class="navbar__actions">
      <div class="navbar__social">
        <a href="https://facebook.com" target="_blank" aria-label="Facebook">
          <img src="assets/images/Social Icon - 1.png" alt="Facebook" />
        </a>
        <a href="https://instagram.com" target="_blank" aria-label="Instagram">
          <img src="assets/images/Social Icon - 2.png" alt="Instagram" />
        </a>
        <a href="https://twitter.com" target="_blank" aria-label="Twitter">
          <img src="assets/images/Social Icon - 3.png" alt="Twitter" />
        </a>
        <a href="https://youtube.com" target="_blank" aria-label="YouTube">
          <img src="assets/images/Social Icon - 4.png" alt="YouTube" />
        </a>
      </div>
      <button class="navbar__hamburger" (click)="toggleMenu()" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>
</nav>
